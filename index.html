<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockforge — Visual Site Builder</title>
<link rel="stylesheet" href="blockforge.css">
</head>
<body>

<header>
  <div class="logo">block<b>forge</b></div>
  <div class="tag">drag · stack · export</div>
  <div class="spacer"></div>
  <button class="btn" id="btn-site">⚙ Site setup</button>
  <button class="btn" id="btn-preview-toggle">Hide preview</button>
  <button class="btn" id="btn-load">Load</button>
  <button class="btn" id="btn-save">Save</button>
  <button class="btn quiet" id="btn-clear">Clear</button>
  <button class="btn primary" id="btn-export">Export site ↓</button>
  <input type="file" id="file-input" accept=".json" hidden>
</header>

<main id="main">
  <aside id="palette-wrap" aria-label="Block palette">
    <input id="pal-search" type="text" placeholder="Search 40 blocks…">
    <div class="pal-hint">click to add · or drag into place</div>
    <div id="palette"></div>
  </aside>

  <section id="workspace-wrap">
    <div class="panel-head">Page stack</div>

    <!-- Block Navigator -->
    <div id="block-nav" aria-label="Block navigator">
      <button class="nav-btn" id="nav-prev" title="Previous block (Alt+↑)" disabled>↑</button>
      <button class="nav-btn" id="nav-next" title="Next block (Alt+↓)" disabled>↓</button>
      <span id="block-nav-label">No blocks yet</span>
      <span id="block-nav-count">—</span>
    </div>

    <div id="workspace" aria-label="Workspace"></div>
  </section>

  <div id="resizer" title="Drag to resize preview"></div>

  <section id="preview-wrap">
    <div class="panel-head">
      Preview
      <div class="spacer" style="flex:1"></div>
      <div class="seg">
        <button id="dev-desktop" class="on">Desktop</button>
        <button id="dev-tablet">Tablet</button>
        <button id="dev-mobile">Mobile</button>
      </div>
      <button class="ph-act" id="btn-preview-close" title="Hide preview">✕</button>
    </div>
    <div id="preview-frame-holder">
      <iframe id="preview" title="Site preview"></iframe>
    </div>
  </section>
</main>

<!-- SITE SETTINGS MODAL -->
<div id="modal-overlay">
  <div id="modal" role="dialog" aria-label="Site settings">
    <h2>Site setup</h2>
    <div class="sub">These go in the exported page's head tag.</div>
    <div class="field">
      <label>Site title (browser tab)</label>
      <input type="text" id="site-title" placeholder="My Site">
    </div>
    <div class="row">
      <div class="field">
        <label>Favicon emoji</label>
        <input type="text" id="site-fav-emoji" placeholder="🚀" maxlength="4">
      </div>
      <div class="fav-preview" id="fav-preview">🌐</div>
    </div>
    <div class="field">
      <label>Favicon image URL (overrides emoji)</label>
      <input type="text" id="site-fav-url" placeholder="https://…/icon.png">
    </div>
    <div class="field">
      <label>Description (for search engines)</label>
      <textarea id="site-desc" rows="2" placeholder="A short description of this site."></textarea>
    </div>
    <div class="modal-acts">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn primary" id="modal-apply">Apply</button>
    </div>
  </div>
</div>

<div id="toast">Saved</div>

<script src="blockforge.js"></script>
</body>
</html>
